<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FinApp.App.Maui</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="FinApp.App.Maui.styles.css" />
    <script>
        try { if (localStorage.getItem('finapp-theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) { }
    </script>
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        window.finappGetTheme = () => { try { return localStorage.getItem('finapp-theme') || 'light'; } catch (e) { return 'light'; } };
        window.finappSetTheme = (theme) => {
            const dark = theme === 'dark';
            document.documentElement.classList.toggle('dark', dark);
            try { localStorage.setItem('finapp-theme', dark ? 'dark' : 'light'); } catch (e) { }
        };
        window.finappNavigate = (url) => { window.location.href = url; };
        window.finappScrollIntoView = (id) => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); };
        window.finappTakeAuthToken = () => {
            try {
                const m = (window.location.hash || '').match(/access_token=([^&]+)/);
                if (m) { history.replaceState(null, '', window.location.pathname + window.location.search); return decodeURIComponent(m[1]); }
            } catch (e) { }
            return null;
        };
        window.finappPickImage = () => new Promise(resolve => {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = () => {
                const file = input.files && input.files[0];
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const size = 128;
                        const canvas = document.createElement('canvas');
                        canvas.width = size; canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        const scale = Math.max(size / img.width, size / img.height);
                        const w = img.width * scale, h = img.height * scale;
                        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    };
                    img.onerror = () => resolve(null);
                    img.src = reader.result;
                };
                reader.onerror = () => resolve(null);
                reader.readAsDataURL(file);
            };
            input.click();
        });
    </script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
