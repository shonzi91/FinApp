<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TandemTab — track together, save together</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=14" />
    <link rel="stylesheet" href="FinApp.App.Web.styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script>
        // Apply the saved theme before first paint to avoid a light flash.
        try { if (localStorage.getItem('finapp-theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) { }
    </script>
</head>

<body>

    <div id="app">
        <div style="display:flex;height:100vh;align-items:center;justify-content:center;font-family:sans-serif;color:#555">Loading…</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        window.finappViewportWidth = () => window.innerWidth || 0;
        window.finappNavigate = (url) => { window.location.href = url; };
        window.finappScrollIntoView = (id) => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); };
        window.finappTakeAuthToken = () => {
            try {
                const m = (window.location.hash || '').match(/access_token=([^&]+)/);
                if (m) { history.replaceState(null, '', window.location.pathname + window.location.search); return decodeURIComponent(m[1]); }
            } catch (e) { }
            return null;
        };
        window.finappGetTheme = () => { try { return localStorage.getItem('finapp-theme') || 'light'; } catch (e) { return 'light'; } };
        window.finappSetTheme = (theme) => {
            const dark = theme === 'dark';
            document.documentElement.classList.toggle('dark', dark);
            try { localStorage.setItem('finapp-theme', dark ? 'dark' : 'light'); } catch (e) { }
        };
        window.finappPickImage = () => new Promise(resolve => {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = () => {
                const file = input.files && input.files[0];
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const size = 128;
                        const canvas = document.createElement('canvas');
                        canvas.width = size; canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        const scale = Math.max(size / img.width, size / img.height);
                        const w = img.width * scale, h = img.height * scale;
                        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    };
                    img.onerror = () => resolve(null);
                    img.src = reader.result;
                };
                reader.onerror = () => resolve(null);
                reader.readAsDataURL(file);
            };
            input.click();
        });
        window.finappDownloadFile = (fileName, base64, contentType) => {
            const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: contentType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>

</body>

</html>
