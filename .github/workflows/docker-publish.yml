name: Build and publish image

# Builds the Docker image on GitHub's runners (plenty of RAM for the .NET/WASM publish)
# and pushes it to the GitHub Container Registry, so small hosts only ever *pull* it.
on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "Dockerfile"
      - ".dockerignore"
      - "NuGet.config"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/finapp
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
